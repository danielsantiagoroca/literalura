# LiterAlura - Configuración
spring.main.encoding=UTF-8

# API Gutendex
app.api.gutendex.url=https://gutendex.com/books

# PostgreSQL — host/usuario/contraseña configurados mediante variables de entorno
spring.datasource.url=jdbc:postgresql://${DB_HOST_POSTGRE}:5432/literalura
spring.datasource.username=${DB_USER_SCREENMATCH}
spring.datasource.password=${DB_PASSWORD_POSTGRE}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway: migraciones en src/main/resources/db/migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
spring.flyway.baseline-on-migrate=true
